<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cloai</title>
  <link rel="icon" type="image/png" sizes="200x200" href="/branding/app-icon.png" />
  <link rel="apple-touch-icon" href="/branding/app-icon.png" />
</head>

<body>
  <div id="root"></div>
  <script>
    (function () {
      window.__CLOAI_DESKTOP_READY__ = false;
      function showStartupError(message, stack) {
        if (window.__CLOAI_DESKTOP_READY__) return;
        var root = document.getElementById('root');
        if (!root) return;
        var details = stack || message || 'Unknown startup error';
        root.innerHTML =
          '<div style="box-sizing:border-box;display:flex;min-height:100vh;width:100vw;align-items:center;justify-content:center;background:#1f1f1e;color:#fff;padding:32px;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">' +
          '<div style="max-width:760px;width:100%;border:1px solid #444341;border-radius:8px;background:#30302e;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.25)">' +
          '<div style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#aba499;font-weight:700">Desktop startup error</div>' +
          '<h1 style="margin:12px 0 8px;font-size:24px;line-height:1.25">Cloai failed to start</h1>' +
          '<p style="margin:0 0 18px;color:#aba499;font-size:14px;line-height:1.5">A JavaScript error happened before the app could render.</p>' +
          '<pre style="white-space:pre-wrap;overflow:auto;max-height:360px;margin:0;padding:14px;border-radius:6px;background:rgba(0,0,0,.28);font-size:12px;line-height:1.45;color:#f5f5f5">' +
          details.replace(/[&<>"']/g, function (ch) {
            return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
          }) +
          '</pre></div></div>';
      }
      window.addEventListener('error', function (event) {
        showStartupError(event.message, event.error && event.error.stack);
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason || {};
        showStartupError(reason.message || String(reason), reason.stack);
      });
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
